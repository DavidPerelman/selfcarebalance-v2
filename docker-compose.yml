version: "3.9"
services:
  backend:
    build: ./backend
    container_name: scb-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: scb-db
    restart: always
    environment:
      POSTGRES_USER: scb_user
      POSTGRES_PASSWORD: scb_password
      POSTGRES_DB: scb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
